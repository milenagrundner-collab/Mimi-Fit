  async list(prefix) { const keys = Object.keys(localStorage).filter((k) => k.startsWith(prefix)); return { keys }; },
  async get(key) { const value = localStorage.getItem(key); return value ? { value } : null; },
  async set(key, value) { localStorage.setItem(key, value); return { value }; },
};

function splitFor(dias) {
  if (dias <= 3)
    return { divisao: "Full Body (A / B / C)", treinos: [
      { nome: "Treino A", foco: "Corpo todo — ênfase em empurrar", grupos: ["peito", "ombro", "triceps", "quadriceps", "abdomen"] },
      { nome: "Treino B", foco: "Corpo todo — ênfase em puxar", grupos: ["costas", "biceps", "posterior", "gluteo", "abdomen"] },
      { nome: "Treino C", foco: "Corpo todo — pernas e core", grupos: ["quadriceps", "posterior", "ombro", "panturrilha", "abdomen"] },
    ]};
  if (dias === 4)
    return { divisao: "Superior / Inferior (2x)", treinos: [
      { nome: "Superior A", foco: "Peito, costas e braços", grupos: ["peito", "costas", "ombro", "biceps", "triceps"] },
      { nome: "Inferior A", foco: "Pernas e glúteos", grupos: ["quadriceps", "posterior", "gluteo", "panturrilha", "abdomen"] },
      { nome: "Superior B", foco: "Ombros e braços", grupos: ["ombro", "peito", "costas", "triceps", "biceps"] },
      { nome: "Inferior B", foco: "Posterior e core", grupos: ["posterior", "quadriceps", "gluteo", "panturrilha", "abdomen"] },
    ]};
  if (dias === 5)
    return { divisao: "Push / Pull / Legs + Upper / Lower", treinos: [
      { nome: "Push", foco: "Peito, ombro e tríceps", grupos: ["peito", "ombro", "triceps"] },
      { nome: "Pull", foco: "Costas e bíceps", grupos: ["costas", "biceps"] },
      { nome: "Legs", foco: "Pernas completas", grupos: ["quadriceps", "posterior", "gluteo", "panturrilha"] },
      { nome: "Superior", foco: "Peito, costas e ombros", grupos: ["peito", "costas", "ombro", "biceps", "triceps"] },
      { nome: "Inferior", foco: "Pernas e core", grupos: ["quadriceps", "posterior", "gluteo", "abdomen"] },
    ]};
  return { divisao: "Push / Pull / Legs (2x)", treinos: [
    { nome: "Push A", foco: "Peito, ombro e tríceps", grupos: ["peito", "ombro", "triceps"] },
    { nome: "Pull A", foco: "Costas e bíceps", grupos: ["costas", "biceps"] },
    { nome: "Legs A", foco: "Pernas completas", grupos: ["quadriceps", "posterior", "gluteo", "panturrilha"] },
    { nome: "Push B", foco: "Ombro e peito", grupos: ["ombro", "peito", "triceps"] },
    { nome: "Pull B", foco: "Costas e bíceps", grupos: ["costas", "biceps", "abdomen"] },
    { nome: "Legs B", foco: "Posterior e glúteos", grupos: ["posterior", "quadriceps", "gluteo", "panturrilha"] },
  ]};
}

function allowedTagsOf(profile) {
  const equip = EQUIPAMENTOS.find((e) => e.label === profile.equipamento) || EQUIPAMENTOS[0];
  return equip.tags;
}
function avoidOf(profile) {
  const r = (profile.restricoes || "").toLowerCase();
  const avoid = [];
  if (/(joelho|menisco|patela)/.test(r)) avoid.push("joelho");
  if (/(lombar|coluna|h[eé]rnia)/.test(r)) avoid.push("lombar");
  if (/(ombro|manguito)/.test(r)) avoid.push("ombro");
  return avoid;
}
function usableFor(profile, grupo, exclude = []) {
  const tags = allowedTagsOf(profile);
  const avoid = avoidOf(profile);
  return EX.filter(
    (e) => e.g === grupo && e.tags.some((t) => tags.includes(t)) &&
      !(e.risk || []).some((rk) => avoid.includes(rk)) && !exclude.includes(e.n)
  );
}

function buildPlan(profile, opts = {}) {
  const param = PARAMS[profile.objetivo] || PARAMS.hipertrofia;
  let nPerWorkout = (N_EX[profile.experiencia] || 5) + (opts.volumeAdj || 0);
  nPerWorkout = Math.max(3, Math.min(8, nPerWorkout));

  const split = splitFor(profile.dias);
  const treinos = split.treinos.map((t) => {
    let grupos = [...t.grupos];
    if (opts.emphasis && grupos.includes(opts.emphasis)) {
      // prioriza o grupo enfatizado colocando-o à frente
      grupos = [opts.emphasis, ...grupos];
    }
    const exercicios = [];
    const used = new Set();
    let gi = 0, safety = 0;
    while (exercicios.length < nPerWorkout && safety < 60) {
      safety++;
      const grupo = grupos[gi % grupos.length];
      gi++;
      const pool = usableFor(profile, grupo, [...used]);
      if (pool.length === 0) continue;
      const pick = pool[Math.floor(Math.random() * pool.length)];
      used.add(pick.n);
      exercicios.push({ nome: pick.n, g: pick.g, series: param.series, reps: param.reps, descanso: param.descanso, obs: pick.obs });
    }
    return { nome: t.nome, foco: t.foco, exercicios };
  });

  const objLabel = (OBJETIVOS.find((o) => o.id === profile.objetivo) || {}).label || "";
  const resumo = `Divisão ${split.divisao} com ${profile.dias}x por semana, ajustada para ${objLabel.toLowerCase()} e nível ${profile.experiencia}.`;
  const observacoes = profile.objetivo === "forca"
    ? "Priorize carga e descanso completo entre séries. Aumente o peso ao completar todas as reps com boa técnica."
    : profile.objetivo === "emagrecimento"
    ? "Mantenha intervalos curtos e ritmo constante. Combine com déficit calórico e atividade aeróbica."
    : "Progrida a carga gradualmente e priorize a execução correta antes de aumentar o peso.";

  return { divisao: split.divisao, resumo, observacoes, treinos };
}

function ytSearch(nome) {
  return `https://www.youtube.com/results?search_query=${encodeURIComponent(nome + " execução musculação")}`;
}

// ── Componentes estáveis (fora do App → corrige o foco do teclado) ──
function Input(props) {
  return <input {...props} style={{
    width: "100%", padding: "13px 14px", borderRadius: 12,
    border: `1.5px solid ${C.line}`, background: C.surface, color: C.text,
    fontSize: 16, outline: "none", boxSizing: "border-box",
  }} />;
}

function Chip({ active, onClick, children, sub }) {
  return <button onClick={onClick} style={{
    textAlign: "left", width: "100%", padding: "14px 16px", borderRadius: 14,
    border: `1.5px solid ${active ? C.pink : C.line}`,
    background: active ? C.surfaceTint : C.surface,
    color: C.text, cursor: "pointer", transition: "all .15s",
  }}>
    <div style={{ fontWeight: 600, fontSize: 15 }}>{children}</div>
    {sub && <div style={{ fontSize: 12.5, color: C.dim, marginTop: 2 }}>{sub}</div>}
  </button>;
}

function App() {
  const [view, setView] = useState("loading");
  const [step, setStep] = useState(0);
  const [profile, setProfile] = useState({
    nome: "", idade: "", peso: "", altura: "", sexo: "",
    experiencia: "", objetivo: "", equipamento: "", dias: 4, restricoes: "",
  });
  const [plan, setPlan] = useState(null);
  const [history, setHistory] = useState([]);

  useEffect(() => {
    (async () => {
      try {
        const res = await store.list("plan:");
        const keys = res?.keys || [];
        const loaded = [];
        for (const k of keys) {
          try { const item = await store.get(k); if (item?.value) loaded.push(JSON.parse(item.value)); } catch (e) {}
        }
        loaded.sort((a, b) => b.createdAt - a.createdAt);
        setHistory(loaded);
      } catch (e) {}
      setView("onboarding");
    })();
  }, []);

  const upd = (k, v) => setProfile((p) => ({ ...p, [k]: v }));

  async function persist(record) {
    try { await store.set(record.id, JSON.stringify(record)); } catch (e) {}
  }

  async function generatePlan(opts) {
    const fullPlan = buildPlan(profile, opts);
    const record = { id: "plan:" + Date.now(), createdAt: Date.now(), profile: { ...profile }, plan: fullPlan };
    await persist(record);
    setPlan(record);
    setHistory((h) => [record, ...h]);
    setView("result");
  }

  // gerar variação automática mantendo o perfil
  async function adjustPlan(opts) {
    const fullPlan = buildPlan(plan.profile, opts);
    const updated = { ...plan, plan: fullPlan, createdAt: Date.now() };
    await persist(updated);
    setPlan(updated);
    setHistory((h) => [updated, ...h.filter((r) => r.id !== updated.id)]);
  }

  // salvar uma ficha editada manualmente (vinda do modo edição)
  async function savePlan(newPlanObj) {
    const updated = { ...plan, plan: newPlanObj, edited: true };
    await persist(updated);
    setPlan(updated);
    setHistory((h) => [updated, ...h.filter((r) => r.id !== updated.id)]);
  }

  const steps = [
    { title: "Quem é você?",
      valid: () => profile.nome && profile.idade && profile.peso && profile.altura && profile.sexo,
      body: (
        <div style={{ display: "grid", gap: 12 }}>
          <Input placeholder="Nome" value={profile.nome} onChange={(e) => upd("nome", e.target.value)} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Input placeholder="Idade" inputMode="numeric" value={profile.idade} onChange={(e) => upd("idade", e.target.value)} />
            <Input placeholder="Peso (kg)" inputMode="numeric" value={profile.peso} onChange={(e) => upd("peso", e.target.value)} />
          </div>
          <Input placeholder="Altura (cm)" inputMode="numeric" value={profile.altura} onChange={(e) => upd("altura", e.target.value)} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {["Feminino", "Masculino"].map((s) => (
              <Chip key={s} active={profile.sexo === s} onClick={() => upd("sexo", s)}>{s}</Chip>
            ))}
          </div>
        </div>
      ) },
    { title: "Sua experiência", valid: () => profile.experiencia,
      body: (<div style={{ display: "grid", gap: 10 }}>
        {EXPERIENCIA.map((e) => (<Chip key={e.id} sub={e.desc} active={profile.experiencia === e.id} onClick={() => upd("experiencia", e.id)}>{e.label}</Chip>))}
      </div>) },
    { title: "Seu objetivo", valid: () => profile.objetivo,
      body: (<div style={{ display: "grid", gap: 10 }}>
        {OBJETIVOS.map((o) => (<Chip key={o.id} sub={o.desc} active={profile.objetivo === o.id} onClick={() => upd("objetivo", o.id)}>{o.label}</Chip>))}
      </div>) },
    { title: "Onde e quanto", valid: () => profile.equipamento,
      body: (<div style={{ display: "grid", gap: 18 }}>
        <div>
          <div style={{ fontSize: 13, color: C.dim, marginBottom: 8 }}>Equipamento disponível</div>
          <div style={{ display: "grid", gap: 8 }}>
            {EQUIPAMENTOS.map((eq) => (<Chip key={eq.label} active={profile.equipamento === eq.label} onClick={() => upd("equipamento", eq.label)}>{eq.label}</Chip>))}
          </div>
        </div>
        <div>
          <div style={{ fontSize: 13, color: C.dim, marginBottom: 8 }}>Dias por semana</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8 }}>
            {DIAS.map((d) => (<button key={d} onClick={() => upd("dias", d)} style={{
              padding: "14px 0", borderRadius: 12, fontSize: 17, fontWeight: 700,
              border: `1.5px solid ${profile.dias === d ? C.pink : C.line}`,
              background: profile.dias === d ? C.surfaceTint : C.surface,
              color: profile.dias === d ? C.pinkDim : C.text, cursor: "pointer",
            }}>{d}</button>))}
          </div>
        </div>
      </div>) },
    { title: "Alguma restrição?", valid: () => true,
      body: (<div style={{ display: "grid", gap: 8 }}>
        <div style={{ fontSize: 13, color: C.dim }}>Lesões, dores ou limitações (opcional)</div>
        <textarea value={profile.restricoes} onChange={(e) => upd("restricoes", e.target.value)}
          placeholder="Ex: dor no joelho, hérnia lombar, ombro sensível..." rows={4}
          style={{ width: "100%", padding: "13px 14px", borderRadius: 12, border: `1.5px solid ${C.line}`,
            background: C.surface, color: C.text, fontSize: 16, outline: "none", resize: "vertical", boxSizing: "border-box", fontFamily: "inherit" }} />
        <div style={{ fontSize: 12, color: C.dim, marginTop: 2 }}>Reconhecemos joelho, lombar/coluna e ombro para evitar exercícios de risco.</div>
      </div>) },
  ];

  const wrap = { minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" };
  const container = { maxWidth: 480, margin: "0 auto", padding: "0 18px 40px" };

  if (view === "loading")
    return <div style={{ ...wrap, display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ color: C.dim }}>Carregando…</div></div>;

  return (
    <div style={wrap}>
      <div style={{ ...container, paddingTop: 24, paddingBottom: 8, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
          <div style={{ width: 30, height: 30, borderRadius: 9, background: C.pink, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, color: "#fff", fontSize: 15 }}>♥</div>
          <span style={{ fontWeight: 800, fontSize: 18, letterSpacing: -0.3 }}>MimiFit</span>
        </div>
        {history.length > 0 && (
          <button onClick={() => setView(view === "history" ? "onboarding" : "history")} style={{
            background: "none", border: `1.5px solid ${C.line}`, color: C.dim,
            padding: "7px 12px", borderRadius: 10, fontSize: 13, cursor: "pointer",
          }}>{view === "history" ? "Voltar" : `Histórico (${history.length})`}</button>
        )}
      </div>

      {view === "onboarding" && (
        <div style={container}>
          <div style={{ display: "flex", gap: 5, marginBottom: 26, marginTop: 14 }}>
            {steps.map((_, i) => (<div key={i} style={{ flex: 1, height: 4, borderRadius: 4, background: i <= step ? C.pink : C.line }} />))}
          </div>
          <h1 style={{ fontSize: 26, fontWeight: 800, margin: "0 0 22px", letterSpacing: -0.5 }}>{steps[step].title}</h1>
          {steps[step].body}
          <div style={{ display: "flex", gap: 10, marginTop: 28 }}>
            {step > 0 && (<button onClick={() => setStep(step - 1)} style={{
              flex: "0 0 auto", padding: "15px 22px", borderRadius: 14, border: `1.5px solid ${C.line}`,
              background: "none", color: C.text, fontSize: 15, fontWeight: 600, cursor: "pointer",
            }}>Voltar</button>)}
            {step < steps.length - 1 ? (
              <button disabled={!steps[step].valid()} onClick={() => setStep(step + 1)} style={{
                flex: 1, padding: "15px 0", borderRadius: 14, border: "none",
                background: steps[step].valid() ? C.pink : C.line, color: steps[step].valid() ? "#fff" : C.dim,
                fontSize: 16, fontWeight: 800, cursor: steps[step].valid() ? "pointer" : "not-allowed",
              }}>Continuar</button>
            ) : (
              <button onClick={() => generatePlan()} style={{
                flex: 1, padding: "15px 0", borderRadius: 14, border: "none",
                background: C.pink, color: "#fff", fontSize: 16, fontWeight: 800, cursor: "pointer",
              }}>Gerar ficha de treino</button>
            )}
          </div>
        </div>
      )}

      {view === "result" && plan && (
        <PlanView plan={plan} ytSearch={ytSearch}
          onNew={() => { setStep(0); setView("onboarding"); }}
          onRegen={() => adjustPlan({})}
          onSave={savePlan} />
      )}

      {view === "history" && (
        <div style={container}>
          <h1 style={{ fontSize: 24, fontWeight: 800, margin: "14px 0 20px" }}>Fichas anteriores</h1>
          <div style={{ display: "grid", gap: 12 }}>
            {history.map((rec) => (
              <button key={rec.id} onClick={() => { setPlan(rec); setView("result"); }} style={{
                textAlign: "left", padding: 16, borderRadius: 14, border: `1.5px solid ${C.line}`,
                background: C.surface, color: C.text, cursor: "pointer",
              }}>
                <div style={{ fontWeight: 700, fontSize: 15 }}>{rec.plan.divisao}</div>
                <div style={{ fontSize: 13, color: C.dim, marginTop: 4 }}>
                  {rec.profile.objetivo} · {rec.profile.dias}x/semana · {new Date(rec.createdAt).toLocaleDateString("pt-BR")}
                </div>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const GRUPOS = [
  { id: "peito", label: "Peito" },
  { id: "costas", label: "Costas" },
  { id: "ombro", label: "Ombros" },
  { id: "biceps", label: "Bíceps" },
  { id: "triceps", label: "Tríceps" },
  { id: "quadriceps", label: "Quadríceps" },
  { id: "posterior", label: "Posterior" },
  { id: "gluteo", label: "Glúteos" },
  { id: "panturrilha", label: "Panturrilha" },
  { id: "abdomen", label: "Abdômen" },
];

// nomes de exercícios catalogados por grupo (para a lista de troca)
function exercisesByGroup(grupo) {
  return EX.filter((e) => e.g === grupo).map((e) => e.n);
}

function PlanView({ plan, ytSearch, onNew, onRegen, onSave }) {
  const [open, setOpen] = useState(0);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(null); // cópia editável da ficha
  // editor de troca de exercício: { ti, ei } ou null
  const [picker, setPicker] = useState(null);

  const p = editing ? draft : plan.plan;
  const container = { maxWidth: 480, margin: "0 auto", padding: "0 18px 40px" };

  function startEdit() {
    setDraft(JSON.parse(JSON.stringify(plan.plan)));
    setEditing(true);
    setOpen(-1);
  }
  function cancelEdit() {
    setEditing(false);
    setDraft(null);
    setPicker(null);
  }
  async function confirmSave() {
    await onSave(draft);
    setEditing(false);
    setDraft(null);
    setPicker(null);
  }

  // helpers de edição sobre o draft
  function setTreino(ti, patch) {
    setDraft((d) => ({ ...d, treinos: d.treinos.map((t, i) => (i === ti ? { ...t, ...patch } : t)) }));
  }
  function setEx(ti, ei, patch) {
    setDraft((d) => ({
      ...d,
      treinos: d.treinos.map((t, i) =>
        i !== ti ? t : { ...t, exercicios: t.exercicios.map((e, j) => (j === ei ? { ...e, ...patch } : e)) }
      ),
    }));
  }
  function addEx(ti) {
    setDraft((d) => ({
      ...d,
      treinos: d.treinos.map((t, i) =>
        i !== ti ? t : { ...t, exercicios: [...t.exercicios, { nome: "Novo exercício", g: "peito", series: "3", reps: "10-12", descanso: "60-90s", obs: "" }] }
      ),
    }));
  }
  function removeEx(ti, ei) {
    setDraft((d) => ({
      ...d,
      treinos: d.treinos.map((t, i) =>
        i !== ti ? t : { ...t, exercicios: t.exercicios.filter((_, j) => j !== ei) }
      ),
    }));
  }

  const fieldStyle = {
    width: "100%", padding: "9px 11px", borderRadius: 9, border: `1.5px solid ${C.line}`,
    background: C.surface, color: C.text, fontSize: 15, outline: "none", boxSizing: "border-box", fontFamily: "inherit",
  };
  const miniStyle = { ...fieldStyle, padding: "8px 9px", fontSize: 14, textAlign: "center" };

  return (
    <div style={container}>
      <div style={{ background: C.surfaceTint, border: `1.5px solid ${C.line}`, borderRadius: 16, padding: 18, marginTop: 14, marginBottom: 16 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.pinkDim, letterSpacing: 0.5, textTransform: "uppercase" }}>{p.divisao}</div>
        <div style={{ fontSize: 15, marginTop: 8, lineHeight: 1.5 }}>{p.resumo}</div>
        {plan.edited && !editing && <div style={{ fontSize: 12, color: C.dim, marginTop: 8 }}>✎ Personalizada pelo Matheus</div>}
      </div>

      {/* Barra de modo edição */}
      {!editing ? (
        <button onClick={startEdit} style={{
          width: "100%", padding: "13px 0", borderRadius: 14, border: `1.5px solid ${C.pink}`,
          background: C.surface, color: C.pinkDim, fontSize: 15, fontWeight: 800, cursor: "pointer", marginBottom: 18,
        }}>✦ Editar ficha (modo Matheus)</button>
      ) : (
        <div style={{ display: "flex", gap: 10, marginBottom: 18 }}>
          <button onClick={cancelEdit} style={{
            flex: "0 0 auto", padding: "13px 20px", borderRadius: 14, border: `1.5px solid ${C.line}`,
            background: C.surface, color: C.text, fontSize: 15, fontWeight: 700, cursor: "pointer",
          }}>Cancelar</button>
          <button onClick={confirmSave} style={{
            flex: 1, padding: "13px 0", borderRadius: 14, border: "none",
            background: C.pink, color: "#fff", fontSize: 15, fontWeight: 800, cursor: "pointer",
          }}>Salvar alterações</button>
        </div>
      )}

      <div style={{ display: "grid", gap: 12 }}>
        {p.treinos.map((t, i) => (
          <div key={i} style={{ border: `1.5px solid ${C.line}`, borderRadius: 16, overflow: "hidden", background: C.surface }}>
            {/* Cabeçalho do treino */}
            {editing ? (
              <div style={{ padding: "14px 16px", display: "grid", gap: 8 }}>
                <input value={t.nome} onChange={(e) => setTreino(i, { nome: e.target.value })} style={{ ...fieldStyle, fontWeight: 700 }} placeholder="Nome do treino" />
                <input value={t.foco} onChange={(e) => setTreino(i, { foco: e.target.value })} style={fieldStyle} placeholder="Foco (ex: peito e tríceps)" />
              </div>
            ) : (
              <button onClick={() => setOpen(open === i ? -1 : i)} style={{
                width: "100%", textAlign: "left", padding: "16px 18px", background: "none",
                border: "none", color: C.text, cursor: "pointer", display: "flex",
                justifyContent: "space-between", alignItems: "center",
              }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 16 }}>{t.nome}</div>
                  <div style={{ fontSize: 12.5, color: C.dim, marginTop: 2 }}>{t.foco}</div>
                </div>
                <span style={{ color: C.dim, fontSize: 18, transform: open === i ? "rotate(180deg)" : "none", transition: ".2s" }}>⌄</span>
              </button>
            )}

            {(editing || open === i) && (
              <div style={{ padding: editing ? "0 16px 14px" : "0 18px 14px" }}>
                {t.exercicios.map((ex, j) => (
                  <div key={j} style={{ padding: "13px 0", borderTop: `1px solid ${C.line}` }}>
                    {editing ? (
                      <div style={{ display: "grid", gap: 8 }}>
                        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                          <input value={ex.nome} onChange={(e) => setEx(i, j, { nome: e.target.value })} style={{ ...fieldStyle, flex: 1 }} placeholder="Nome do exercício" />
                          <button onClick={() => removeEx(i, j)} title="Remover" style={{
                            flexShrink: 0, width: 36, height: 36, borderRadius: 9, border: `1.5px solid ${C.line}`,
                            background: C.surface, color: C.dim, fontSize: 18, cursor: "pointer", lineHeight: 1,
                          }}>×</button>
                        </div>
                        <button onClick={() => setPicker({ ti: i, ei: j })} style={{
                          textAlign: "left", padding: "8px 11px", borderRadius: 9, border: `1.5px dashed ${C.line}`,
                          background: C.surface, color: C.pinkDim, fontSize: 13, fontWeight: 600, cursor: "pointer",
                        }}>↻ Escolher da lista de exercícios</button>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
                          <div>
                            <div style={{ fontSize: 11, color: C.dim, marginBottom: 3 }}>Séries</div>
                            <input value={ex.series} onChange={(e) => setEx(i, j, { series: e.target.value })} style={miniStyle} />
                          </div>
                          <div>
                            <div style={{ fontSize: 11, color: C.dim, marginBottom: 3 }}>Reps</div>
                            <input value={ex.reps} onChange={(e) => setEx(i, j, { reps: e.target.value })} style={miniStyle} />
                          </div>
                          <div>
                            <div style={{ fontSize: 11, color: C.dim, marginBottom: 3 }}>Descanso</div>
                            <input value={ex.descanso} onChange={(e) => setEx(i, j, { descanso: e.target.value })} style={miniStyle} />
                          </div>
                        </div>
                        <input value={ex.obs || ""} onChange={(e) => setEx(i, j, { obs: e.target.value })} style={{ ...fieldStyle, fontStyle: "italic" }} placeholder="Observação (opcional)" />
                      </div>
                    ) : (
                      <div>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                          <div style={{ fontWeight: 600, fontSize: 15, flex: 1 }}>{ex.nome}</div>
                          <a href={ytSearch(ex.nome)} target="_blank" rel="noreferrer" style={{
                            flexShrink: 0, fontSize: 12, fontWeight: 700, color: C.pinkDim, textDecoration: "none",
                            border: `1.5px solid ${C.pink}`, padding: "5px 10px", borderRadius: 8,
                          }}>▶ vídeo</a>
                        </div>
                        <div style={{ display: "flex", gap: 14, marginTop: 7, fontSize: 13, color: C.dim }}>
                          <span><b style={{ color: C.text }}>{ex.series}</b> séries</span>
                          <span><b style={{ color: C.text }}>{ex.reps}</b> reps</span>
                          <span>descanso <b style={{ color: C.text }}>{ex.descanso}</b></span>
                        </div>
                        {ex.obs && <div style={{ fontSize: 12.5, color: C.dim, marginTop: 6, fontStyle: "italic" }}>{ex.obs}</div>}
                      </div>
                    )}
                  </div>
                ))}
                {editing && (
                  <button onClick={() => addEx(i)} style={{
                    width: "100%", marginTop: 12, padding: "11px 0", borderRadius: 11, border: `1.5px dashed ${C.pink}`,
                    background: C.surface, color: C.pinkDim, fontSize: 14, fontWeight: 700, cursor: "pointer",
                  }}>+ Adicionar exercício</button>
                )}
              </div>
            )}
          </div>
        ))}
      </div>

      {p.observacoes && !editing && (
        <div style={{ marginTop: 18, padding: 16, borderRadius: 14, border: `1.5px dashed ${C.line}`, fontSize: 13.5, color: C.dim, lineHeight: 1.5 }}>💡 {p.observacoes}</div>
      )}
      {editing && (
        <div style={{ marginTop: 16 }}>
          <div style={{ fontSize: 13, color: C.dim, marginBottom: 6 }}>Observações da ficha</div>
          <textarea value={draft.observacoes || ""} onChange={(e) => setDraft((d) => ({ ...d, observacoes: e.target.value }))} rows={3}
            style={{ ...fieldStyle, resize: "vertical" }} placeholder="Dicas gerais, progressão, etc." />
        </div>
      )}

      {!editing && (
        <div style={{ display: "flex", gap: 10, marginTop: 22 }}>
          <button onClick={onRegen} style={{
            flex: "0 0 auto", padding: "15px 20px", borderRadius: 14, border: `1.5px solid ${C.line}`,
            background: "none", color: C.text, fontSize: 15, fontWeight: 700, cursor: "pointer",
          }}>↻ Variar</button>
          <button onClick={onNew} style={{
            flex: 1, padding: "15px 0", borderRadius: 14, border: "none",
            background: C.pink, color: "#fff", fontSize: 16, fontWeight: 800, cursor: "pointer",
          }}>Nova ficha</button>
        </div>
      )}

      {!editing && (
        <p style={{ fontSize: 11.5, color: C.dim, marginTop: 16, lineHeight: 1.5, textAlign: "center" }}>
          Sugestões automáticas. Consulte um profissional de educação física antes de iniciar, especialmente se tiver restrições.
        </p>
      )}

      {/* Modal de escolha de exercício */}
      {picker && (
        <ExercisePicker
          grupoInicial={draft.treinos[picker.ti].exercicios[picker.ei].g || "peito"}
          onClose={() => setPicker(null)}
          onChoose={(nome, g) => {
            const found = EX.find((e) => e.n === nome);
            setEx(picker.ti, picker.ei, { nome, g: g || (found ? found.g : "peito"), obs: found ? found.obs : "" });
            setPicker(null);
          }}
        />
      )}
    </div>
  );
}

function ExercisePicker({ grupoInicial, onClose, onChoose }) {
  const [grupo, setGrupo] = useState(grupoInicial);
  const [livre, setLivre] = useState("");
  const lista = exercisesByGroup(grupo);

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, background: "rgba(58,34,48,0.45)", display: "flex",
      alignItems: "flex-end", justifyContent: "center", zIndex: 50,
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: "100%", maxWidth: 480, background: C.bg, borderTopLeftRadius: 22, borderTopRightRadius: 22,
        padding: "18px 18px 28px", maxHeight: "80vh", overflowY: "auto", boxSizing: "border-box",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ fontWeight: 800, fontSize: 18 }}>Trocar exercício</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: C.dim, fontSize: 24, cursor: "pointer", lineHeight: 1 }}>×</button>
        </div>

        <div style={{ fontSize: 13, color: C.dim, marginBottom: 8 }}>Grupo muscular</div>
        <div style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 6, marginBottom: 14 }}>
          {GRUPOS.map((g) => (
            <button key={g.id} onClick={() => setGrupo(g.id)} style={{
              flexShrink: 0, padding: "8px 13px", borderRadius: 20, fontSize: 13, fontWeight: 600,
              border: `1.5px solid ${grupo === g.id ? C.pink : C.line}`,
              background: grupo === g.id ? C.surfaceTint : C.surface,
              color: grupo === g.id ? C.pinkDim : C.text, cursor: "pointer",
            }}>{g.label}</button>
          ))}
        </div>

        <div style={{ display: "grid", gap: 8, marginBottom: 18 }}>
          {lista.map((nome) => (
            <button key={nome} onClick={() => onChoose(nome, grupo)} style={{
              textAlign: "left", padding: "12px 14px", borderRadius: 12, border: `1.5px solid ${C.line}`,
              background: C.surface, color: C.text, fontSize: 15, fontWeight: 600, cursor: "pointer",
            }}>{nome}</button>
          ))}
        </div>

        <div style={{ fontSize: 13, color: C.dim, marginBottom: 8 }}>Ou digite um exercício personalizado</div>
        <div style={{ display: "flex", gap: 8 }}>
          <input value={livre} onChange={(e) => setLivre(e.target.value)} placeholder="Nome do exercício"
            style={{ flex: 1, padding: "12px 14px", borderRadius: 12, border: `1.5px solid ${C.line}`, background: C.surface, color: C.text, fontSize: 15, outline: "none", boxSizing: "border-box" }} />
          <button disabled={!livre.trim()} onClick={() => onChoose(livre.trim(), grupo)} style={{
            flexShrink: 0, padding: "0 18px", borderRadius: 12, border: "none",
            background: livre.trim() ? C.pink : C.line, color: livre.trim() ? "#fff" : C.dim,
            fontSize: 15, fontWeight: 800, cursor: livre.trim() ? "pointer" : "not-allowed",
          }}>Usar</button>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
